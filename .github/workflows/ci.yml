name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
      - run: go vet ./...
      - run: go test -v -race -timeout 60s ./...
      - run: go build -o bin/server ./cmd/server